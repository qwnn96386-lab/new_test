name: shop_radar_assistant
description: 自動偵測周邊店家並快速開啟行動支付與載具的行動助手。
publish_to: 'none' # 防止誤發佈至 pub.dev
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 1. 核心資料庫：儲存店家資訊、座標與支付偏好
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # 2. 核心定位與地理圍欄：偵測使用者是否進入店家範圍
  geofence_service: ^6.0.0+1

  # 3. 權限管理：定位、通知等必要權限請求
  permission_handler: ^11.3.1

  # 4. 跳轉支付與網頁：用於開啟 Line Pay, JKO Pay 等第三方 App
  url_launcher: ^6.3.1

  # 5. UI 與硬體互動工具
  barcode_widget: ^2.0.4       # 顯示電子載具條碼
  screen_brightness: ^1.0.1    # 顯示條碼時自動調亮螢幕
  sensors_plus: ^5.0.1         # 搖一搖觸發功能 (加速度計)
  perfect_volume_control: ^1.0.0 # 透過音量鍵快速啟動 (選配)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  # 啟用 Material Design 視覺元件
  uses-material-design: true

  # 未來如有圖片資源或自定義字體，請在此處配置：
  # assets:
  #   - assets/images/
  #   - assets/data/