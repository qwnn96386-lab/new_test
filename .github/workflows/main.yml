name: iOS_IPA_Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Rebuild iOS Environment
        run: |
          # 1. 徹底清除舊環境
          rm -rf android
          rm -rf ios
          flutter clean
          
          # 2. 重新產生 iOS 專案 (這會生成正確的 Podfile 結構)
          flutter create --platforms ios .
          flutter pub get
          
          # 3. 注入地理圍欄權限到新的 Podfile (用 Ruby 腳本直接替換)
          # 這一步確保編譯時會開啟定位、背景、通知與感測器代碼
          cat <<EOF > ios/Podfile
          platform :ios, '14.0'
          require_relative '../.flutter-plugins-dependencies'
          target 'Runner' do
            use_frameworks!
            use_modular_headers!
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] ||= [
                  '\$(inherited)',
                  'PERMISSION_LOCATION=1',
                  'PERMISSION_BACKGROUND_LOCATION=1',
                  'PERMISSION_NOTIFICATIONS=1',
                  'PERMISSION_SENSORS=1'
                ]
              end
            end
          end
          EOF
          
          # 4. 建立空的依賴檔以滿足舊版腳本需求 (防止報錯關鍵)
          touch .flutter-plugins-dependencies
          echo "[]" > .flutter-plugins-dependencies

      - name: Build iOS for Real Device (No Codesign)
        run: |
          # 執行編譯，Flutter 會自動處理 CocoaPods
          flutter build ios --release --no-codesign

      - name: Package into IPA (For Sideloadly)
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r radar_assistant.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-radar-ipa
          path: build/ios/iphoneos/radar_assistant.ipa
