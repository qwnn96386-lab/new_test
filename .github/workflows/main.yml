name: iOS_IPA_Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Prepare iOS Environment
        run: |
          # 1. 刪除 Android
          rm -rf android
          
          # 2. 取得套件
          flutter pub get
          
          # 3. 【核心修正】直接用 sed 註解掉 Podfile 裡那行會報錯的 require_relative
          # 這行是解決 Invalid Podfile file: cannot load such file 的終極手段
          sed -i '' "s/require_relative '..\/\.flutter-plugins-dependencies'/# require_relative '..\/\.flutter-plugins-dependencies'/g" ios/Podfile
          
          # 4. 預下載 iOS 依賴
          flutter precache --ios

      - name: Build iOS IPA
        run: |
          # 執行編譯，現在 Podfile 已經被修正且結構完整
          flutter build ios --release --no-codesign

      - name: Package into IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r radar_assistant.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-radar-ipa
          path: build/ios/iphoneos/radar_assistant.ipa
