name: iOS_IPA_Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Fix Environment
        run: |
          # 1. 徹底移除 Android
          rm -rf android
          
          # 2. 獲取套件 (這會生成依賴描述檔)
          flutter pub get
          
          # 3. 預下載 iOS 相關檔案
          flutter precache --ios
          
          # 4. 強制重新產生 iOS 專案結構（確保 Podfile 與 Flutter 同步）
          # 這一步會自動解決 .flutter-plugins-dependencies 缺失的問題
          flutter create --platforms ios .

      - name: Build iOS for Real Device (No Codesign)
        run: |
          # 直接使用 flutter build，它會自動處理 pod install
          # 這樣就不會遇到手動 cd ios && pod install 的路徑錯誤
          flutter build ios --release --no-codesign

      - name: Package into IPA (For Sideloadly)
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r radar_assistant.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-radar-ipa
          path: build/ios/iphoneos/radar_assistant.ipa
