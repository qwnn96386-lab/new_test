name: iOS_IPA_Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Prepare Environment
        run: |
          # 1. 依照你的要求，刪除 Android 部分，保持純淨
          rm -rf android
          
          # 2. 取得套件
          flutter pub get
          
          # 3. 【核心修正】手動建立那個讓 Podfile 崩潰的隱藏檔
          # 如果這個檔案不存在，Podfile 執行 require_relative 就會失敗
          touch .flutter-plugins-dependencies
          echo "{ \"plugins\": { \"ios\": [] } }" > .flutter-plugins-dependencies
          
          # 4. 確保 iOS 依賴預下載
          flutter precache --ios

      - name: Build iOS for Real Device (No Codesign)
        run: |
          # 這裡會直接讀取你專案裡的 ios/Podfile
          # 因為我們上面手動補了檔案，它就不會再報路徑錯誤了
          flutter build ios --release --no-codesign

      - name: Package into IPA (For Sideloadly)
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphone
