name: iOS_IPA_Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Prepare iOS Environment
        run: |
          # 1. 刪除 Android
          rm -rf android
          
          # 2. 取得插件
          flutter pub get
          
          # 3. 【解決路徑報錯關鍵】
          # 因為你的 Podfile 裡有 require_relative '../.flutter-plugins-dependencies'
          # 我們必須確保這個檔案在雲端真的存在
          touch .flutter-plugins-dependencies
          echo '{"plugins":{"ios":[]}}' > .flutter-plugins-dependencies
          
          # 4. 下載 iOS 依賴檔
          flutter precache --ios

      - name: Build iOS IPA
        run: |
          # 執行編譯，現在 Podfile 結構完整了，不會再噴 No dependencies
          flutter build ios --release --no-codesign

      - name: Package into IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r radar_assistant.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-radar-ipa
          path: build/ios/iphoneos/radar_assistant.ipa
