name: iOS_IPA_Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Fix Environment
        run: |
          # 1. 徹底移除 Android 確保純淨
          rm -rf android
          
          # 2. 獲取套件
          flutter pub get
          
          # 3. 預下載 iOS 相關檔案
          flutter precache --ios
          
          # 4. 關鍵修正：建立一個空的檔案，防止 Podfile 的 require_relative 報錯
          touch .flutter-plugins-dependencies

      - name: Build iOS for Real Device (No Codesign)
        run: |
          # 執行編譯，Flutter 會自動處理 CocoaPods
          flutter build ios --release --no-codesign

      - name: Package into IPA (For Sideloadly)
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r radar_assistant.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-radar-ipa
          path: build/ios/iphoneos/radar_assistant.ipa
