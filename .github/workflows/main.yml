name: iOS_IPA_Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Fix Podfile Path Error
        run: |
          # 1. 刪除 Android 資料夾，確保環境純淨
          rm -rf android
          
          # 2. 取得套件
          flutter pub get
          
          # 3. 【核心修正】直接把你 Podfile 裡第 5 行那行報錯的指令刪除
          # 這樣 pod install 就不會因為找不到檔案而中斷
          sed -i '' '/.flutter-plugins-dependencies/d' ios/Podfile
          
          # 4. 預下載 iOS 依賴
          flutter precache --ios

      - name: Build iOS for Real Device (No Codesign)
        run: |
          # 執行編譯，現在 Podfile 已經被我們修正，不會再噴路徑錯誤了
          flutter build ios --release --no-codesign

      - name: Package into IPA (For Sideloadly)
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r radar_assistant.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-radar-ipa
          path: build/ios/iphoneos/radar_assistant.ipa
